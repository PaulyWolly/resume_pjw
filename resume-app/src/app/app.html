<div class="page">
  <div class="toolbar">
    <button
      class="toolbar-btn toolbar-btn--secondary"
      type="button"
      (click)="openRecommendation()"
    >
      ✦ Letter of Recommendation
    </button>

    <button
      class="toolbar-btn"
      type="button"
      (click)="downloadPdf()"
      [disabled]="generating()"
    >
      @if (generating()) {
        Generating PDF…
      } @else {
        ↓ Download Resume PDF
      }
    </button>
  </div>

  <main id="resume-content" class="resume-card">
    <app-header
      [name]="resume.name"
      [headline]="resume.headline"
      [contact]="resume.contact"
      [summary]="resume.summary"
    />

    <app-experience
      [jobs]="resume.experience"
      [education]="resume.education"
    />

    <app-skills [skillGroups]="resume.skillGroups" />
  </main>

  <footer class="page-footer">
    <p>Built with Angular v20 · Hosted on Netlify</p>
  </footer>
</div>

@if (recommendationOpen()) {
  <div class="rec-modal" (click)="closeRecommendation()">
    <div
      class="rec-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="Letter of Recommendation"
      (click)="$event.stopPropagation()"
    >
      <div class="rec-modal__header">
        <div class="rec-modal__titles">
          <h2 class="rec-modal__title">Letter of Recommendation</h2>
          <p class="rec-modal__subtitle">Thermo Fisher Scientific</p>
        </div>

        <div class="rec-modal__actions">
          <a
            class="toolbar-btn toolbar-btn--compact"
            [href]="recommendationPdfUrl"
            [download]="recommendationDownloadName"
            target="_blank"
            rel="noopener noreferrer"
          >
            ↓ Download
          </a>
          <button
            type="button"
            class="rec-modal__close"
            (click)="closeRecommendation()"
            aria-label="Close letter of recommendation"
          >
            ✕
          </button>
        </div>
      </div>

      <iframe
        class="rec-modal__frame"
        [src]="recommendationEmbedUrl"
        title="Letter of Recommendation from Thermo Fisher Scientific"
      ></iframe>
    </div>
  </div>
}
